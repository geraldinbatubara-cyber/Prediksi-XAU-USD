name: XAU USD monitoring

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Monitoring job to run
        required: true
        default: capture-estimate
        type: choice
        options:
          - capture-estimate
          - capture-actual
  schedule:
    - cron: "59 14 * * 0-5"
    - cron: "0 23 * * 0-5"

permissions:
  contents: write

jobs:
  monitoring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Determine mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "59 14 * * 0-5" ]; then
            echo "mode=capture-estimate" >> "$GITHUB_OUTPUT"
          else
            echo "mode=capture-actual" >> "$GITHUB_OUTPUT"
          fi
      - name: Run monitoring job
        run: python scripts/monitoring_job.py "${{ steps.mode.outputs.mode }}"
      - name: Commit monitoring data
        shell: bash
        run: |
          if git diff --quiet -- data/monitoring.csv; then
            echo "No monitoring changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/monitoring.csv
          git commit -m "Update XAU USD monitoring data"
          git push
