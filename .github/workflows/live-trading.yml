name: XAU USD live trading ledger

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: live-trading-ledger
  cancel-in-progress: false

jobs:
  live-trading:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Update live trading ledger
        run: python scripts/live_trading_job.py
      - name: Commit live trading ledger
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- data/live_trading_optimizer.csv)" ]; then
            echo "No live trading ledger changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live_trading_optimizer.csv
          git commit -m "Update XAU USD live trading ledger"
          git push
