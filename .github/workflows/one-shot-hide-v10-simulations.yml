name: One-shot hide v10 simulations

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/one-shot-hide-v10-simulations.yml"

permissions:
  contents: write

jobs:
  patch-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch app simulation tabs
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("app.py")
          text = path.read_text(encoding="utf-8")

          replacements = [
              (
                  'SIMULATION_CACHE_VERSION = "optimizer-v1-v10-paper-live-2026-08-30"',
                  'SIMULATION_CACHE_VERSION = "optimizer-v1-walk-forward-paper-live-2026-08-30"',
              ),
              (
                  '    optimized_v10_real_runner = strategy_optimizer_module.run_optimized_strategy_v10_real_data\n'
                  '    optimized_v10_walk_forward_runner = strategy_optimizer_module.run_optimized_strategy_v10_walk_forward\n'
                  '    optimized_v10_result, optimization_v10_leaderboard = optimized_v10_runner(gold_ohlc)\n'
                  '    optimized_v10_real_result, optimization_v10_real_leaderboard = optimized_v10_real_runner(gold_ohlc)\n',
                  '    optimized_v10_walk_forward_runner = strategy_optimizer_module.run_optimized_strategy_v10_walk_forward\n'
                  '    _, optimization_v10_leaderboard = optimized_v10_runner(gold_ohlc)\n',
              ),
              (
                  '        optimized_v10_result,\n'
                  '        optimization_v10_leaderboard,\n'
                  '        optimized_v10_real_result,\n'
                  '        optimization_v10_real_leaderboard,\n',
                  '        optimization_v10_leaderboard,\n',
              ),
              ('    if cached is None or len(cached) < 4:\n        return pd.DataFrame()\n    leaderboard = cached[3]',
               '    if cached is None or len(cached) < 3:\n        return pd.DataFrame()\n    leaderboard = cached[2]'),
              (
                  '    optimized_v10_result,\n'
                  '    optimization_v10_leaderboard: pd.DataFrame,\n'
                  '    optimized_v10_real_result,\n'
                  '    optimization_v10_real_leaderboard: pd.DataFrame,\n',
                  '    _optimization_v10_leaderboard: pd.DataFrame,\n',
              ),
              (
                  '        "Simulasi menampilkan eksperimen Optimizer yang sudah dipilih untuk dibandingkan. "\n'
                  '        "Model lama serta eksperimen v6-v9 dihapus dari tab ini agar dashboard tetap ringan."\n',
                  '        "Simulasi sekarang hanya menampilkan Strategi Terbaik Optimizer dan v10 Walk-Forward Test agar dashboard tetap ringan."\n',
              ),
              (
                  '        "Asumsi utama: equity awal USD 1.000, target tiap fase +20%, maksimal 8 BUY dan 10 SELL. "\n'
                  '        "Optimizer v10 memperluas pencarian dari v8 ke parameter sinyal, TP/SL, lot, batas posisi, risk cap, dan profit protection. "\n'
                  '        "v10 Data Real menguji parameter terbaik v10 pada periode 1-16 Juli 2026 tanpa optimasi ulang. "\n'
                  '        "v10 Walk-Forward memakai dataset 1 Jan 2023-30 Jun 2026 dengan expanding train dan test per kuartal. "\n',
                  '        "Asumsi utama: equity awal USD 1.000, target tiap fase +20%, maksimal 8 BUY dan 10 SELL. "\n'
                  '        "v10 Walk-Forward memakai dataset 1 Jan 2023-30 Jun 2026 dengan expanding train dan test per kuartal. "\n'
                  '        "Parameter v10 tetap disimpan tersembunyi untuk Live Trading v10, tetapi tab Simulasi v10 biasa dan v10 Data Real tidak lagi ditampilkan. "\n',
              ),
              (
                  '    (\n'
                  '        optimizer_tab,\n'
                  '        optimizer_v10_tab,\n'
                  '        optimizer_v10_real_tab,\n'
                  '        optimizer_v10_walk_forward_tab,\n'
                  '    ) = st.tabs(\n'
                  '        [\n'
                  '            "Strategi Terbaik Optimizer",\n'
                  '            "Strategi Optimizer v10",\n'
                  '            "v10 Data Real",\n'
                  '            "v10 Walk-Forward Test",\n'
                  '        ]\n'
                  '    )\n',
                  '    (\n'
                  '        optimizer_tab,\n'
                  '        optimizer_v10_walk_forward_tab,\n'
                  '    ) = st.tabs(\n'
                  '        [\n'
                  '            "Strategi Terbaik Optimizer",\n'
                  '            "v10 Walk-Forward Test",\n'
                  '        ]\n'
                  '    )\n',
              ),
              (
                  '            "Aplikasi sengaja tidak menghitung v1/v10, v10 Data Real, dan v10 Walk-Forward saat startup agar dashboard bisa dibuka lebih cepat."',
                  '            "Aplikasi sengaja tidak menghitung v1 dan v10 Walk-Forward saat startup agar dashboard bisa dibuka lebih cepat."',
              ),
              (
                  '        if st.button("Bangun ulang simulasi v1/v10/v10 Data Real/v10 Walk-Forward", use_container_width=True):',
                  '        if st.button("Bangun ulang simulasi v1/v10 Walk-Forward", use_container_width=True):',
              ),
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f"Expected text not found: {old[:120]!r}")
              text = text.replace(old, new, 1)

          text, count = re.subn(
              r'\n    with optimizer_v10_tab:\n.*?\n    with optimizer_v10_walk_forward_tab:',
              '\n    with optimizer_v10_walk_forward_tab:',
              text,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit("Could not remove v10/v10 Data Real render blocks")

          path.write_text(text, encoding="utf-8")
          Path(".github/workflows/one-shot-hide-v10-simulations.yml").unlink(missing_ok=True)
          PY
      - name: Commit patched app
        shell: bash
        run: |
          if git diff --quiet -- app.py .github/workflows/one-shot-hide-v10-simulations.yml; then
            echo "No patch changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.py .github/workflows/one-shot-hide-v10-simulations.yml
          git commit -m "Show only v1 and walk-forward simulations"
          git push
