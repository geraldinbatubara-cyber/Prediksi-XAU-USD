name: One-shot lazy page navigation
# trigger: 2026-07-18 lazy navigation patch

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/one-shot-lazy-navigation.yml"

permissions:
  contents: write

jobs:
  patch-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch app to lazy render pages
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("app.py")
          text = path.read_text(encoding="utf-8")

          old_sidebar = '''    history_years = st.slider("Riwayat grafik (tahun)", 1, 10, 3)
    model_choice = st.radio(
        "Model prediksi",
        ["Model 2 - Lintas Pasar", "Model 1 - Harga Historis"],
    )
    direction_threshold = st.select_slider(
        "Threshold sinyal arah",
        options=[0.50, 0.55, 0.60, 0.65, 0.70],
        value=0.65,
        format_func=lambda value: f"{value:.0%}",
    )
'''
          new_sidebar = '''    page = st.radio(
        "Halaman",
        ["Dashboard", "Simulasi", "Live Trading", "Audit Intraday"],
        index=0,
    )
    if page == "Dashboard":
        history_years = st.slider("Riwayat grafik (tahun)", 1, 10, 3)
        model_choice = st.radio(
            "Model prediksi",
            ["Model 2 - Lintas Pasar", "Model 1 - Harga Historis"],
        )
        direction_threshold = st.select_slider(
            "Threshold sinyal arah",
            options=[0.50, 0.55, 0.60, 0.65, 0.70],
            value=0.65,
            format_func=lambda value: f"{value:.0%}",
        )
'''
          if old_sidebar not in text:
              raise SystemExit("Sidebar control block not found")
          text = text.replace(old_sidebar, new_sidebar, 1)

          marker = "\ntry:\n    market, data_fetched_at = get_data()"
          start = text.find(marker)
          if start == -1:
              raise SystemExit("Main eager render block not found")

          new_main = '''
if page == "Dashboard":
    try:
        market, data_fetched_at = get_data()
        model_1, model_2, direction_model = get_models(market)
    except Exception as exc:
        st.error(f"Data belum dapat diproses: {exc}")
        st.stop()

    render_dashboard(
        market,
        data_fetched_at,
        model_1,
        model_2,
        direction_model,
        model_choice,
        direction_threshold,
        history_years,
    )

elif page == "Simulasi":
    simulation_payload = load_precomputed_simulations(SIMULATION_CACHE_VERSION)
    if simulation_payload is None:
        st.warning(
            "Hasil simulasi precomputed untuk versi terbaru belum tersedia. "
            "Aplikasi sengaja tidak menghitung v1 dan v10 Walk-Forward saat startup agar dashboard bisa dibuka lebih cepat."
        )
        if st.button("Bangun ulang simulasi v1/v10 Walk-Forward", use_container_width=True):
            with st.spinner("Menghitung simulasi lengkap. Proses ini bisa memakan waktu di Streamlit Cloud."):
                simulation_payload = get_simulations(SIMULATION_CACHE_VERSION)
            st.rerun()
    else:
        st.info(
            "Hasil simulasi precomputed tersedia. Untuk menjaga aplikasi ringan saat dibuka, "
            "visualisasi simulasi tidak dirender otomatis."
        )
        if st.checkbox("Tampilkan hasil simulasi precomputed", value=False):
            try:
                gold_ohlc = get_gold_ohlc()
            except Exception as exc:
                st.error(f"Data OHLC belum dapat diproses: {exc}")
                st.stop()
            render_simulation(*simulation_payload, gold_ohlc)

elif page == "Live Trading":
    try:
        gold_ohlc = get_gold_ohlc()
    except Exception as exc:
        st.error(f"Data OHLC belum dapat diproses: {exc}")
        st.stop()

    live_v1_tab, live_v10_tab = st.tabs(["Optimizer v1", "Optimizer v10"])
    st.info("Rencana evaluasi: paper live trading paralel Optimizer v1 dan Optimizer v10 berjalan sampai **30 Agustus 2026**.")
    with live_v1_tab:
        optimization_v1_live_leaderboard = get_v1_leaderboard_for_live(SIMULATION_CACHE_VERSION)
        render_live_trading(
            gold_ohlc,
            optimization_v1_live_leaderboard,
            title="Optimizer v1",
            start_date=LIVE_START_DATE,
            live_path=LIVE_TRADING_PATH,
            manual_path=LIVE_MANUAL_EXIT_PATH,
            key_prefix="v1",
            strategy_note=(
                "Ini adalah Live Trading lama yang sudah berjalan. Entry mengikuti sinyal Optimizer v1, "
                "boleh menambah posisi dari sinyal hari berbeda sampai batas maksimal 8 BUY dan 10 SELL."
            ),
        )
    with live_v10_tab:
        optimization_v10_live_leaderboard = get_v10_leaderboard_for_live(SIMULATION_CACHE_VERSION)
        render_live_trading(
            gold_ohlc,
            optimization_v10_live_leaderboard,
            title="Optimizer v10",
            start_date=LIVE_V10_START_DATE,
            live_path=LIVE_TRADING_V10_PATH,
            manual_path=LIVE_MANUAL_EXIT_V10_PATH,
            key_prefix="v10",
            strategy_note=(
                "Paper live v10 mulai 20 Juli 2026. Parameter diambil dari hasil Optimizer v10 precomputed, "
                "sehingga tidak menghitung ulang optimizer berat saat dashboard dibuka."
            ),
        )

else:
    try:
        gold_ohlc = get_gold_ohlc()
    except Exception as exc:
        st.error(f"Data OHLC belum dapat diproses: {exc}")
        st.stop()

    render_intraday_audit(gold_ohlc)
'''
          text = text[:start] + new_main
          path.write_text(text, encoding="utf-8")
          Path(".github/workflows/one-shot-lazy-navigation.yml").unlink(missing_ok=True)
          PY
      - name: Commit patched app
        shell: bash
        run: |
          if git diff --quiet -- app.py .github/workflows/one-shot-lazy-navigation.yml; then
            echo "No patch changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.py .github/workflows/one-shot-lazy-navigation.yml
          git commit -m "Lazy render main dashboard pages"
          git push
