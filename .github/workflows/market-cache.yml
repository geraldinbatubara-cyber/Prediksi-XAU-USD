name: XAU USD market cache

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/market-cache.yml"
      - "gold_forecast/data.py"
      - "gold_forecast/dashboard_snapshot.py"
      - "gold_forecast/model.py"
      - "gold_forecast/model_v2.py"
      - "gold_forecast/direction_model.py"
      - "scripts/update_market_cache.py"
      - "scripts/update_dashboard_snapshot.py"
  schedule:
    - cron: "30 21 * * 0-5"

permissions:
  contents: write

concurrency:
  group: market-cache
  cancel-in-progress: false

jobs:
  update-market-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Update market cache
        run: python scripts/update_market_cache.py
      - name: Build dashboard snapshot
        run: python scripts/update_dashboard_snapshot.py
      - name: Commit market cache and dashboard snapshot
        shell: bash
        run: |
          git add data/cache/gold_ohlc.csv data/cache/market_data.csv \
            data/precomputed/dashboard_snapshot.pkl data/precomputed/v10_params.json
          if git diff --cached --quiet; then
            echo "No market or dashboard snapshot changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update market cache and dashboard snapshot"
          git pull --rebase origin main
          git push

