name: XAU USD market cache

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/market-cache.yml"
      - "gold_forecast/data.py"
      - "scripts/update_market_cache.py"
  schedule:
    - cron: "30 21 * * 0-5"

permissions:
  contents: write

concurrency:
  group: market-cache
  cancel-in-progress: false

jobs:
  update-market-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Update market cache
        run: python scripts/update_market_cache.py
      - name: Commit market cache
        shell: bash
        run: |
          if git diff --quiet -- data/cache/gold_ohlc.csv data/cache/market_data.csv; then
            echo "No market cache changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cache/gold_ohlc.csv data/cache/market_data.csv
          git commit -m "Update XAU USD market cache"
          git push
